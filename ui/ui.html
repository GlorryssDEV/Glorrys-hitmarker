<!DOCTYPE html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet"><style>body{margin:0;overflow:hidden;font-family:'Inter',sans-serif}.hit{position:absolute;transform:translate(-50%,-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center}.damage{font-weight:900;letter-spacing:1px;text-shadow:0 3px 10px rgba(0,0,0,.9),0 0 20px rgba(0,0,0,.7);filter:drop-shadow(0 0 6px currentColor)}.headshot{font-weight:700;letter-spacing:2px;margin-top:-6px;padding:2px 8px;border-radius:6px;background:rgba(255,140,0,.15);color:#ff8c00;text-shadow:0 0 6px rgba(0,0,0,.9),0 0 12px rgba(255,140,0,.6)}@keyframes float{0%{transform:translate(-50%,-50%) scale(.7);opacity:0}15%{transform:translate(-50%,-70%) scale(1.25);opacity:1}40%{transform:translate(-50%,-85%) scale(1)}100%{transform:translate(-50%,-190%) scale(.9);opacity:0}}@keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.2)}100%{transform:scale(1)}}</style></head><body><script>function randomOffset(){return Math.random()*50-25}window.addEventListener("message",function(e){if(e.data.action!=="hit")return;const h=document.createElement("div");h.className="hit";h.style.left=e.data.x*100+"%";h.style.top=e.data.y*100+"%";h.style.marginLeft=randomOffset()+"px";h.style.marginTop=randomOffset()+"px";h.style.animation=`float ${e.data.duration}ms cubic-bezier(.22,.9,.3,1) forwards`;const d=document.createElement("div");d.className="damage";d.innerText=e.data.damage;d.style.color=`rgb(${e.data.color.r},${e.data.color.g},${e.data.color.b})`;d.style.fontSize=e.data.size+"px";d.style.animation="pop .25s ease";h.appendChild(d);if(e.data.headshot){const s=document.createElement("div");s.className="headshot";s.innerText="HEADSHOT";s.style.fontSize=e.data.headsize+"px";s.style.animation="pop .35s ease";h.appendChild(s)}document.body.appendChild(h);setTimeout(function(){h.remove()},e.data.duration)})</script></body></html>
