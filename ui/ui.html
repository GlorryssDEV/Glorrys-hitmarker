<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box
}

body{
  margin:0;
  overflow:hidden;
  font-family:'JetBrains Mono', monospace;
  background:transparent;
  color:#f0f0f0
}

.hit{
  position:absolute;
  transform:translate(-50%,-50%);
  pointer-events:none;
  display:flex;
  flex-direction:column;
  align-items:center
}

.damage{
  font-weight:700;
  letter-spacing:0.5px;
  text-shadow:
    0 2px 6px rgba(0,0,0,.9),
    0 0 12px rgba(0,0,0,.7);
  filter:drop-shadow(0 0 4px currentColor)
}

.headshot{
  font-weight:600;
  letter-spacing:1.5px;
  margin-top:-4px;
  padding:2px 6px;
  border-radius:4px;
  background:rgba(255,140,0,.12);
  color:#ff8c00;
  text-shadow:
    0 0 6px rgba(0,0,0,.9),
    0 0 10px rgba(255,140,0,.6)
}

@keyframes float{
  0%{
    transform:translate(-50%,-50%) scale(.75);
    opacity:0
  }
  20%{
    transform:translate(-50%,-70%) scale(1.15);
    opacity:1
  }
  50%{
    transform:translate(-50%,-90%) scale(1)
  }
  100%{
    transform:translate(-50%,-180%) scale(.9);
    opacity:0
  }
}

@keyframes pop{
  0%{transform:scale(.7)}
  60%{transform:scale(1.15)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<script>
function rnd(){
  return Math.random()*50-25
}

window.addEventListener("message", function(e){
  if(!e.data || e.data.action !== "hit") return

  const wrap = document.createElement("div")
  wrap.className = "hit"

  wrap.style.left = (e.data.x * 100) + "%"
  wrap.style.top  = (e.data.y * 100) + "%"

  wrap.style.marginLeft = rnd() + "px"
  wrap.style.marginTop  = rnd() + "px"

  wrap.style.animation = "float " + e.data.duration + "ms cubic-bezier(.22,.9,.3,1) forwards"

  const dmg = document.createElement("div")
  dmg.className = "damage"

  dmg.innerText = e.data.damage

  dmg.style.color = `rgb(${e.data.color.r},${e.data.color.g},${e.data.color.b})`
  dmg.style.fontSize = e.data.size + "px"
  dmg.style.animation = "pop .25s ease"

  wrap.appendChild(dmg)

  if(e.data.headshot){
    const hs = document.createElement("div")
    hs.className = "headshot"
    hs.innerText = "HEADSHOT"

    hs.style.fontSize = e.data.headsize + "px"
    hs.style.animation = "pop .35s ease"

    wrap.appendChild(hs)
  }

  document.body.appendChild(wrap)

  setTimeout(()=>{
    wrap.remove()
  }, e.data.duration)
})
</script>

</body>
</html>
